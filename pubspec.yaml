name: genui_monorepo
publish_to: none
license: BSD-3-Clause

environment:
  sdk: ">=3.9.2 <4.0.0"
  flutter: ">=3.35.7 <4.0.0"

workspace:
  - examples/catalog_gallery
  - examples/simple_chat
  - examples/travel_app
  - packages/genui
  - packages/genui_dartantic
  - packages/genui_dartantic/example
  - packages/genui_firebase_ai
  - packages/genui_google_generative_ai
  - packages/json_schema_builder
  - tool/fix_copyright
  - tool/release
  - tool/test_and_fix

flutter:
  uses-material-design: true

# Pin mistralai_dart to 0.1.1 (avoid 0.1.1+1 which has breaking API changes).
# dartantic_ai 2.1.1 is not compatible with mistralai_dart 0.1.1+1.
dependency_overrides:
  mistralai_dart: 0.1.1
